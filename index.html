<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>আমার Expense Tracker</title>
<style>
body{font-family:sans-serif;background:#f0f2f5;padding:10px}
.container{max-width:400px;margin:auto;background:white;padding:20px;border-radius:10px;box-shadow:0 0 10px #ccc}
h1{text-align:center;color:#2c3e50}
input,button{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:5px}
.btn{background:#27ae60;color:white;border:none;font-size:16px}
.list{margin-top:20px}
.item{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #eee}
.total{font-size:20px;font-weight:bold;text-align:center;margin-top:10px}
</style>
</head>
<body>
<div class="container">
  <h1>💰 আমার Expense Tracker</h1>
  <input type="text" id="desc" placeholder="কিসের খরচ?">
  <input type="number" id="amount" placeholder="টাকার পরিমান">
  <button class="btn" onclick="addExpense()">খরচ যোগ করুন</button>
  <div class="list" id="list"></div>
  <div class="total">মোট খরচ: <span id="total">0</span> টাকা</div>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
function show() {
  let list = document.getElementById('list');
  let total = 0;
  list.innerHTML = '';
  expenses.forEach((e,i)=>{
    total += e.amount;
    list.innerHTML += `<div class="item"><span>${e.desc}</span><span>${e.amount} ৳</span></div>`
  });
  document.getElementById('total').innerText = total;
}
function addExpense(){
  let desc = document.getElementById('desc').value;
  let amount = parseFloat(document.getElementById('amount').value);
  if(desc && amount){
    expenses.push({desc,amount});
    localStorage.setItem('expenses',JSON.stringify(expenses));
    document.getElementById('desc').value = '';
    document.getElementById('amount').value = '';
    show();
  }
}
show();
</script>
</body>
</html>
